apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 889168908024.dkr.ecr.ap-south-1.amazonaws.com/artify_frontend:${{ github.sha }}
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_URL
          value: "http://aee7c4d4933c7400f9dfd03bbb161bc1-1332424929.ap-south-1.elb.amazonaws.com"
        
