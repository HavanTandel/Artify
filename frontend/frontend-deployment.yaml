apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 889168908024.dkr.ecr.ap-south-1.amazonaws.com/artify_frontend
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_URL
          value: "http://a4e380640441e4e5fbb849832f8297b5-1351344539.ap-south-1.elb.amazonaws.com"
        
